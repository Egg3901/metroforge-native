# GitHub auto-generated release notes configuration.
#
# Consumed by `gh release create --generate-notes` and by `release.yml`'s
# `softprops/action-gh-release` step (`generate_release_notes: true`). Groups
# merged PRs since the previous tag into sections by label. Label PRs before
# merge: that's what determines section placement, not this file.
#
# See docs/DEVELOPMENT.md's "Release process" section for the full release
# workflow this feeds into.

changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Rendering
      labels:
        - rendering
    - title: Simulation & Protocol
      labels:
        - sim
        - protocol
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Performance
      labels:
        - performance
    - title: Other
      labels:
        - "*"
