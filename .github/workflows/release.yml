name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Linux + Windows both build on ubuntu-latest: the Windows client is
  # cross-compiled with cargo-xwin (no windows-latest runner needed/paid
  # for), and both Bun sidecar targets cross-compile from Linux too.
  linux-and-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      # The TypeScript sidecar (spec §2) lives in a sibling repo.
      #
      # NOTE(sidecar-merged 2026-07-10): the sidecar merged to metroforge
      # master via PR #17/#18. Pinned to that merge SHA (not the branch name)
      # so an unrelated upstream metroforge change can't silently break a
      # release build; bump the SHA deliberately when pulling sidecar changes.
      - name: Checkout metroforge (sidecar source)
        uses: actions/checkout@v4
        with:
          repository: Egg3901/metroforge
          ref: e576cc90712cb6a19fc58a348bb18ae9d3388f46
          path: metroforge

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: bun install (sidecar deps)
        working-directory: metroforge/sidecar
        run: bun install

      - name: Create dist-sidecar staging dir
        run: mkdir -p metroforge-native/dist-sidecar

      - name: Compile sidecar (linux-x64)
        working-directory: metroforge
        run: bun build --compile --target=bun-linux-x64 ./sidecar/index.ts --outfile ../metroforge-native/dist-sidecar/metroforge-sidecar

      - name: Compile sidecar (windows-x64)
        working-directory: metroforge
        run: bun build --compile --target=bun-windows-x64 ./sidecar/index.ts --outfile ../metroforge-native/dist-sidecar/metroforge-sidecar.exe

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      # cargo-xwin downloads the MSVC CRT/Windows SDK on first use (a few
      # hundred MB) and the tool itself takes a couple minutes to build from
      # source — both are cacheable across runs. Bump the `v1` suffix below
      # to force-invalidate if a cargo-xwin/SDK upgrade ever needs a clean
      # cache.
      - name: Cache cargo-xwin tool + Windows SDK + cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-xwin
            ~/.cargo/registry
            ~/.cache/cargo-xwin
          key: ubuntu-cargo-xwin-v1-${{ hashFiles('metroforge-native/Cargo.lock') }}
          restore-keys: |
            ubuntu-cargo-xwin-v1-

      - name: Install cross-compile toolchain and Bevy Linux system deps
        run: sudo apt-get update && sudo apt-get install -y clang llvm lld libasound2-dev libudev-dev pkg-config

      # makensis builds the Windows setup exe cross-platform; no Windows
      # runner needed (packaging/windows/installer.nsi).
      - name: Install NSIS (Windows installer)
        run: sudo apt-get install -y nsis

      - name: Add Windows rustup target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        run: command -v cargo-xwin || cargo install cargo-xwin

      - name: cargo build --release -p mf-game (linux)
        working-directory: metroforge-native
        run: cargo build --release -p mf-game

      - name: cargo xwin build --release -p mf-game (windows)
        working-directory: metroforge-native
        run: cargo xwin build --release -p mf-game --target x86_64-pc-windows-msvc

      - name: Package (linux)
        working-directory: metroforge-native
        run: ./scripts/package.sh linux "${{ steps.version.outputs.value }}"

      - name: Package (windows)
        working-directory: metroforge-native
        run: ./scripts/package.sh windows "${{ steps.version.outputs.value }}"

      # Gate: run the packaged linux artifact exactly as a player would (cold,
      # no MF_* env vars) and fail the release if the window is a solid-color
      # void. v0.1.0-alpha shipped with an invisible menu because nothing
      # between `cargo build` and a player's double-click ever executed the
      # bytes players actually download.
      - name: Install artifact smoke-test deps (xvfb + software vulkan + imagemagick + winit X11 runtime libs)
        # libxkbcommon-x11-0 etc. exist on any real desktop but NOT on the
        # bare ubuntu-latest runner image; without them winit panics inside
        # xkbcommon-dl before the first frame (caught by this gate on the
        # first v0.1.1-alpha attempt).
        run: sudo apt-get install -y xvfb mesa-vulkan-drivers libvulkan1 imagemagick libxkbcommon0 libxkbcommon-x11-0 libxcursor1 libxi6 libxrandr2

      - name: Smoke-test packaged linux artifact (cold player run)
        working-directory: metroforge-native
        run: |
          mkdir -p /tmp/mf-smoke
          tar xzf "release-artifacts/metroforge-${{ steps.version.outputs.value }}-linux-x64.tar.gz" -C /tmp/mf-smoke
          cd /tmp/mf-smoke
          Xvfb :99 -screen 0 1280x800x24 & echo $! > xvfb.pid
          sleep 3
          DISPLAY=:99 ./metroforge > run.log 2>&1 & echo $! > game.pid
          sleep 75
          DISPLAY=:99 import -window root shot.png
          kill "$(cat game.pid)" 2>/dev/null || true
          kill "$(cat xvfb.pid)" 2>/dev/null || true
          UNIQUE=$(identify -format %k shot.png)
          echo "smoke screenshot unique colors: $UNIQUE"
          echo "--- last 40 lines of game log ---"
          tail -40 run.log || true
          if [ "$UNIQUE" -lt 50 ]; then
            echo "::error::Artifact smoke test FAILED: screen is a near-solid void ($UNIQUE unique colors) - the packaged game did not reach a rendered menu"
            exit 1
          fi

      - name: Upload smoke screenshot (always, for eyeballing)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-screenshot
          path: /tmp/mf-smoke/shot.png
          if-no-files-found: ignore

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-linux-x64.tar.gz
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-windows-x64.zip
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-windows-x64-setup.exe

  macos:
    runs-on: macos-latest
    # The linux job carries the cold-player smoke test; if the packaged build
    # is a void, no platform's assets should reach the release.
    needs: linux-and-windows
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      # NOTE(sidecar-merged 2026-07-10): see the identical checkout step in
      # the linux-and-windows job above — same pinned SHA, same rationale.
      - name: Checkout metroforge (sidecar source)
        uses: actions/checkout@v4
        with:
          repository: Egg3901/metroforge
          ref: e576cc90712cb6a19fc58a348bb18ae9d3388f46
          path: metroforge

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: bun install (sidecar deps)
        working-directory: metroforge/sidecar
        run: bun install

      - name: Create dist-sidecar staging dir
        run: mkdir -p metroforge-native/dist-sidecar

      # GitHub's macos-latest runners are Apple Silicon.
      - name: Compile sidecar (darwin-arm64)
        working-directory: metroforge
        run: bun build --compile --target=bun-darwin-arm64 ./sidecar/index.ts --outfile ../metroforge-native/dist-sidecar/metroforge-sidecar-darwin-arm64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      - name: cargo build --release -p mf-game
        working-directory: metroforge-native
        run: cargo build --release -p mf-game

      - name: Package (macos)
        working-directory: metroforge-native
        run: ./scripts/package.sh macos "${{ steps.version.outputs.value }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-macos-arm64.zip
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-macos-arm64.dmg
