name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Fast-fail preflight gate: runs clippy to catch lint/type errors in ~3 min
  # before spending 20+ min on full builds. Both linux-and-windows and macos
  # depend on this gate, so a clippy failure fails fast.
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      - name: Install Bevy Linux system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev pkg-config libwayland-dev

      - name: cargo clippy --workspace -D warnings
        working-directory: metroforge-native
        run: cargo clippy --workspace -j 4 -- -D warnings

  # Linux + Windows both build on ubuntu-latest: the Windows client is
  # cross-compiled with cargo-xwin (no windows-latest runner needed/paid
  # for).
  linux-and-windows:
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      # cargo-xwin downloads the MSVC CRT/Windows SDK on first use (a few
      # hundred MB) and the tool itself takes a couple minutes to build from
      # source — both are cacheable across runs. Bump the `v1` suffix below
      # to force-invalidate if a cargo-xwin/SDK upgrade ever needs a clean
      # cache.
      - name: Cache cargo-xwin tool + Windows SDK + cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-xwin
            ~/.cargo/registry
            ~/.cache/cargo-xwin
          key: ubuntu-cargo-xwin-v1-${{ hashFiles('metroforge-native/Cargo.lock') }}
          restore-keys: |
            ubuntu-cargo-xwin-v1-

      - name: Install cross-compile toolchain and Bevy Linux system deps
        run: sudo apt-get update && sudo apt-get install -y clang llvm lld libasound2-dev libudev-dev pkg-config libwayland-dev

      # makensis builds the Windows setup exe cross-platform; no Windows
      # runner needed (packaging/windows/installer.nsi).
      - name: Install NSIS (Windows installer)
        run: sudo apt-get install -y nsis

      - name: Add Windows rustup target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        run: command -v cargo-xwin || cargo install cargo-xwin

      - name: cargo build --release -p mf-game (linux)
        working-directory: metroforge-native
        run: cargo build --release -p mf-game

      - name: cargo xwin build --release -p mf-game (windows)
        working-directory: metroforge-native
        run: cargo xwin build --release -p mf-game --target x86_64-pc-windows-msvc

      - name: Package (linux)
        working-directory: metroforge-native
        run: ./scripts/package.sh linux "${{ steps.version.outputs.value }}"

      - name: Package (windows)
        working-directory: metroforge-native
        run: ./scripts/package.sh windows "${{ steps.version.outputs.value }}"

      # Gate: run the packaged linux artifact exactly as a player would (cold,
      # no MF_* env vars) and fail the release if the window is a solid-color
      # void. v0.1.0-alpha shipped with an invisible menu because nothing
      # between `cargo build` and a player's double-click ever executed the
      # bytes players actually download.
      - name: Install artifact smoke-test deps (xvfb + software vulkan + imagemagick + winit X11 runtime libs)
        # libxkbcommon-x11-0 etc. exist on any real desktop but NOT on the
        # bare ubuntu-latest runner image; without them winit panics inside
        # xkbcommon-dl before the first frame (caught by this gate on the
        # first v0.1.1-alpha attempt).
        run: sudo apt-get install -y xvfb mesa-vulkan-drivers libvulkan1 imagemagick libxkbcommon0 libxkbcommon-x11-0 libxcursor1 libxi6 libxrandr2

      - name: Smoke-test packaged linux artifact (cold player run)
        working-directory: metroforge-native
        run: |
          mkdir -p /tmp/mf-smoke
          tar xzf "release-artifacts/metroforge-${{ steps.version.outputs.value }}-linux-x64.tar.gz" -C /tmp/mf-smoke
          cd /tmp/mf-smoke
          mkdir -p verify-menu
          Xvfb :99 -screen 0 1280x800x24 & echo $! > xvfb.pid
          sleep 3
          # Capture via the in-process MF_VERIFY harness (Bevy screenshot API,
          # writes menu.png from the MainMenu state) instead of `import -window
          # root`. External X-root grabs return a solid-color void under headless
          # Xvfb with no compositor on GitHub runners (llvmpipe), which flaked
          # every recent release to macOS-only. MF_VERIFY_DIR with no autostart
          # holds at the menu; the harness screenshots the real framebuffer.
          DISPLAY=:99 MF_VERIFY_DIR=verify-menu ./metroforge > run.log 2>&1 & echo $! > game.pid
          UNIQUE=1
          for i in $(seq 1 24); do
            sleep 10
            if [ -f verify-menu/menu.png ]; then
              sleep 2
              UNIQUE=$(identify -format %k verify-menu/menu.png 2>/dev/null || echo 1)
              echo "menu.png produced at ~$((i*10))s: $UNIQUE unique colors"
              break
            fi
            kill -0 "$(cat game.pid)" 2>/dev/null || { echo "game exited before menu.png"; break; }
            echo "cold-menu poll $i (~$((i*10))s): waiting for menu.png"
          done
          kill "$(cat game.pid)" 2>/dev/null || true
          kill "$(cat xvfb.pid)" 2>/dev/null || true
          echo "smoke menu.png unique colors: $UNIQUE"
          echo "--- last 60 lines of game log ---"
          tail -60 run.log || true
          if [ ! -f verify-menu/menu.png ] || [ "$UNIQUE" -lt 50 ]; then
            echo "::error::Artifact smoke test FAILED: menu did not render ($UNIQUE unique colors) - the packaged game never produced a rendered main menu"
            exit 1
          fi

      # Second gate: enter an actual city. v0.5.1's first candidate had a
      # protocol regression where the ui stream never decoded - title screen
      # rendered fine (this gate alone passed) while the game could never
      # leave the loading screen. MF_AUTOSTART drives straight into NYC.
      - name: Smoke-test in-city (autostart, cold player run)
        working-directory: metroforge-native
        # ADVISORY: rendering a heavy in-city NYC frame on GitHub's software
        # Vulkan (llvmpipe) runners is too slow to reliably finish in a sane
        # window (the build renders in-city fine on real hardware). Keep this as
        # a warn-only signal + screenshot upload; the blocking invisible-menu
        # protection is the cold-menu gate above. Tracked in #157 (self-hosted
        # runner would let this block again).
        continue-on-error: true
        run: |
          cd /tmp/mf-smoke
          mkdir -p verify-city
          Xvfb :98 -screen 0 1280x800x24 & echo $! > xvfb2.pid
          sleep 3
          # Harness-capture; MF_AUTOSTART drives into NYC and the harness writes
          # default.png at a daytime dense-centre frame. Advisory cap.
          DISPLAY=:98 MF_AUTOSTART=nyc MF_VERIFY_DIR=verify-city MF_VERIFY_NETWORK=1 ./metroforge > run-city.log 2>&1 & echo $! > game2.pid
          UNIQUE=1
          for i in $(seq 1 24); do
            sleep 10
            if [ -f verify-city/default.png ]; then
              sleep 2
              UNIQUE=$(identify -format %k verify-city/default.png 2>/dev/null || echo 1)
              echo "default.png produced at ~$((i*10))s: $UNIQUE unique colors"
              break
            fi
            kill -0 "$(cat game2.pid)" 2>/dev/null || { echo "game exited before default.png"; break; }
            echo "in-city poll $i (~$((i*10))s): waiting for default.png"
          done
          kill "$(cat game2.pid)" 2>/dev/null || true
          kill "$(cat xvfb2.pid)" 2>/dev/null || true
          echo "in-city default.png unique colors: $UNIQUE"
          tail -30 run-city.log || true
          if [ ! -f verify-city/default.png ] || [ "$UNIQUE" -lt 1000 ]; then
            echo "::warning::In-city smoke advisory: $UNIQUE unique colors / default.png missing - CI runner likely too slow to render an in-city frame in the window (build renders fine on real hardware; see #157). Not blocking the release."
          fi

      # Third gate: render an in-city hero frame on EACH of the four quality
      # tiers (potato/low/medium/high). native#102 shipped a Potato/Low
      # in-city black void while High rendered fine — a tier-specific
      # regression the single-tier gates above cannot see. The plain in-city
      # gate is also fooled on low tiers (HUD chrome alone clears its 1000
      # floor over a void world), so this drives the verify harness to a
      # daytime hero-framed city per tier with a floor set above UI-only.
      - name: Smoke-test all four quality tiers (in-city, per-tier floor)
        working-directory: metroforge-native
        # ADVISORY (same rationale as the in-city gate #157): four heavy in-city
        # renders on llvmpipe exceed any sane CI window. Warn-only; screenshots
        # are uploaded below for manual review.
        continue-on-error: true
        run: |
          bash scripts/tier-smoke.sh /tmp/mf-smoke/metroforge /tmp/mf-smoke/tiers 240

      - name: Upload smoke screenshot (always, for eyeballing)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-screenshot
          path: |
            /tmp/mf-smoke/verify-menu/menu.png
            /tmp/mf-smoke/verify-city/default.png
            /tmp/mf-smoke/tiers/*/default.png
          if-no-files-found: ignore

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-linux-x64.tar.gz
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-windows-x64.zip
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-windows-x64-setup.exe

  macos:
    runs-on: macos-latest
    # This job runs in parallel with linux-and-windows (both depend on the
    # fast preflight gate). The linux job carries the cold-player smoke test;
    # if that test fails, the release is marked failed and no assets reach
    # the release. macos assets upload independently via softprops which
    # handles concurrent uploads to the same tag.
    needs: gate
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      - name: cargo build --release -p mf-game
        working-directory: metroforge-native
        run: cargo build --release -p mf-game

      # hdiutil needs free temp space roughly equal to the dmg contents; the
      # ~10GB cargo target dir filled the runner on v0.5.0-alpha. The client
      # binary is already built - stash it, drop the build tree, then package.
      - name: Free runner disk before packaging
        working-directory: metroforge-native
        run: |
          mkdir -p /tmp/mf-bin && cp target/release/metroforge /tmp/mf-bin/
          rm -rf target
          mkdir -p target/release && cp /tmp/mf-bin/metroforge target/release/

      - name: Package (macos)
        working-directory: metroforge-native
        run: ./scripts/package.sh macos "${{ steps.version.outputs.value }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-macos-arm64.zip
            metroforge-native/release-artifacts/metroforge-${{ steps.version.outputs.value }}-macos-arm64.dmg
