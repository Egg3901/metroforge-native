name: CI

on:
  push:
    branches: [master]
  pull_request:

# Linux-only (spec §6): this is a private repo, and Windows/macOS runners
# carry a per-minute cost multiplier that isn't worth paying for every push.
# release.yml is where the 3-OS matrix lives.
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      - name: Install Bevy Linux system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev pkg-config libwayland-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      - name: cargo fmt --check
        working-directory: metroforge-native
        run: cargo fmt --check

      - name: check strings table for en/em dashes
        working-directory: metroforge-native
        run: scripts/check-strings-dashes.sh

      - name: cargo clippy -D warnings
        working-directory: metroforge-native
        run: cargo clippy --workspace --all-targets -j 4 -- -D warnings

      - name: cargo test
        working-directory: metroforge-native
        run: cargo test --workspace -j 4

      # Non-blocking dependency hygiene: duplicate versions, yanked crates,
      # and license allowlist. Failures print as annotations but never block
      # the smoke/clippy gate or release.yml.
      - name: cargo deny (warn only)
        continue-on-error: true
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: metroforge-native/Cargo.toml
          command: check advisories bans licenses sources

  # PR-time boot smoke (#126). The `rust` job runs clippy + unit tests but
  # NEVER boots the client, so a whole class of release-breakers reached
  # master invisibly: a schedule-init panic that crashed the binary on boot
  # (#121), a protocol regression that stuck the game on the loading screen,
  # and render voids. This job builds the sidecar + the release binary and
  # runs it headless exactly as a player would, failing if the window is a
  # near-solid void (never rendered a menu) or the in-city view never leaves
  # the loading screen. Mirrors release.yml's cold-run gate, at PR time.
  # NOTE: this catches BOOT + RENDER regressions; it does not yet exercise
  # egui pointer input (the #123 dead-click class) — that needs synthetic
  # click injection, tracked as a follow-up.
  boot-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      # Sidecar source lives in the sibling repo; pin to the same merge SHA
      # release.yml uses so an unrelated upstream change can't break the gate.
      - name: Checkout metroforge (sidecar source)
        uses: actions/checkout@v4
        with:
          repository: Egg3901/metroforge
          ref: 5ec720a80ae29027805b2abced6a3ce833bf2177
          path: metroforge

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install Bevy + smoke runtime deps (xvfb, software vulkan, imagemagick, winit X11 libs)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev pkg-config libwayland-dev xvfb mesa-vulkan-drivers libvulkan1 imagemagick libxkbcommon0 libxkbcommon-x11-0 libxcursor1 libxi6 libxrandr2

      - name: Compile sidecar (linux-x64)
        working-directory: metroforge
        run: |
          bun install
          bun build --compile --target=bun-linux-x64 ./sidecar/index.ts --outfile ../metroforge-native/dist-sidecar/metroforge-sidecar

      - name: Build release client
        working-directory: metroforge-native
        run: cargo build --release -p mf-game -j 4

      - name: Boot smoke — cold menu + in-city (fail on solid void)
        working-directory: metroforge-native
        env:
          MF_SIDECAR_PATH: ${{ github.workspace }}/metroforge-native/dist-sidecar/metroforge-sidecar
        run: |
          set -uo pipefail
          BIN=./target/release/metroforge
          # 1) Cold menu boot — a schedule-init panic (#121) leaves a solid void.
          Xvfb :99 -screen 0 1280x800x24 & echo $! > xvfb.pid
          sleep 3
          DISPLAY=:99 "$BIN" > menu.log 2>&1 & echo $! > menu.pid
          sleep 60
          DISPLAY=:99 import -window root shot-menu.png || true
          kill "$(cat menu.pid)" 2>/dev/null || true
          kill "$(cat xvfb.pid)" 2>/dev/null || true
          MU=$(identify -format %k shot-menu.png 2>/dev/null || echo 0)
          echo "menu unique colors: $MU"; tail -30 menu.log || true
          if [ "$MU" -lt 50 ]; then
            echo "::error::Boot smoke FAILED (menu): $MU unique colors — the binary never rendered a menu (boot panic / invisible UI)."
            exit 1
          fi
          # 2) In-city autostart — a stuck loading screen or protocol regression
          #    leaves a near-empty frame; a rendered city has many colors.
          Xvfb :98 -screen 0 1280x800x24 & echo $! > xvfb2.pid
          sleep 3
          DISPLAY=:98 MF_AUTOSTART=nyc "$BIN" > city.log 2>&1 & echo $! > city.pid
          sleep 100
          DISPLAY=:98 import -window root shot-city.png || true
          kill "$(cat city.pid)" 2>/dev/null || true
          kill "$(cat xvfb2.pid)" 2>/dev/null || true
          CU=$(identify -format %k shot-city.png 2>/dev/null || echo 0)
          echo "in-city unique colors: $CU"; tail -30 city.log || true
          if [ "$CU" -lt 1000 ]; then
            echo "::error::Boot smoke FAILED (in-city): $CU unique colors — the game likely never left the loading screen."
            exit 1
          fi

      - name: Per-tier in-city smoke (potato/low/medium/high, fail on tier void)
        working-directory: metroforge-native
        env:
          MF_SIDECAR_PATH: ${{ github.workspace }}/metroforge-native/dist-sidecar/metroforge-sidecar
        # native#102: the in-city gate above runs a single (auto-detected)
        # tier and a void can hide behind HUD chrome on the low tiers. This
        # boots each of the four tiers into a hero-framed NYC and fails if any
        # renders below its per-tier unique-colour floor. See scripts/tier-smoke.sh.
        run: |
          set -uo pipefail
          bash scripts/tier-smoke.sh ./target/release/metroforge "$PWD/tier-smoke" 90

      - name: Upload smoke screenshots (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-smoke-screenshots
          path: |
            metroforge-native/shot-menu.png
            metroforge-native/shot-city.png
            metroforge-native/tier-smoke/*/default.png
          if-no-files-found: ignore

  # PR-time Windows cross-compile CHECK (#107). The host `rust` job is
  # Linux-only, so `#[cfg(windows)]` paths (e.g. the JobHandle Send/Sync
  # break in #100) only ever compiled in release.yml on tag and reached
  # master undetected. A `cargo xwin check` is much cheaper than the full
  # build release.yml does, and catches those breaks at PR time. The xwin
  # tool + Windows SDK cache is shared with release.yml via the same key.
  windows-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      # Mirror release.yml's cargo-xwin cache (same key) so PR checks reuse
      # the MSVC CRT/Windows SDK the release job already downloaded.
      - name: Cache cargo-xwin tool + Windows SDK + cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-xwin
            ~/.cargo/registry
            ~/.cache/cargo-xwin
          key: ubuntu-cargo-xwin-v1-${{ hashFiles('metroforge-native/Cargo.lock') }}
          restore-keys: |
            ubuntu-cargo-xwin-v1-

      - name: Install cross-compile toolchain and Bevy Linux system deps
        run: sudo apt-get update && sudo apt-get install -y clang llvm lld libasound2-dev libudev-dev pkg-config libwayland-dev

      - name: Add Windows rustup target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        run: command -v cargo-xwin || cargo install cargo-xwin

      - name: cargo xwin check --workspace (windows)
        working-directory: metroforge-native
        run: cargo xwin check --workspace -j 4 --target x86_64-pc-windows-msvc

  # Optional: kill the sidecar mid-session and assert the client recovers
  # in place (MF_TEST_KILL_SIDECAR). Continues on error so a missing/broken
  # sidecar checkout never reds the required `rust` job — flip
  # `continue-on-error` to false once the recovery path is a hard gate.
  sidecar-recovery:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      - name: Checkout metroforge (sidecar source)
        uses: actions/checkout@v4
        with:
          repository: Egg3901/metroforge
          ref: 6ce1bbafe71be7694bacd59073fbe5087d27ba8c
          path: metroforge

      - name: Install Bevy Linux system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev pkg-config libwayland-dev xvfb mesa-vulkan-drivers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      - name: bun install + compile sidecar
        working-directory: metroforge/sidecar
        run: |
          bun install
          bun run compile:linux

      - name: Build mf-game
        working-directory: metroforge-native
        run: cargo build -p mf-game --release -j 4

      - name: Kill-sidecar recovery harness (30s)
        working-directory: metroforge-native
        env:
          MF_AUTOSTART: nyc
          MF_TEST_KILL_SIDECAR: "30"
          MF_TEST_KILL_SIDECAR_RESULT: ${{ github.workspace }}/sidecar-recovery-result.txt
          MF_SIDECAR_PATH: ${{ github.workspace }}/metroforge/sidecar/dist/metroforge-sidecar
          WGPU_BACKEND: vulkan
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          set -euo pipefail
          # Sidecar compile output path varies; accept common locations.
          if [ ! -x "$MF_SIDECAR_PATH" ]; then
            for candidate in \
              "${{ github.workspace }}/metroforge/sidecar/dist/metroforge-sidecar" \
              "${{ github.workspace }}/metroforge/dist-sidecar/metroforge-sidecar" \
              "${{ github.workspace }}/metroforge/sidecar/metroforge-sidecar"
            do
              if [ -x "$candidate" ]; then
                export MF_SIDECAR_PATH="$candidate"
                break
              fi
            done
          fi
          if [ ! -x "$MF_SIDECAR_PATH" ]; then
            echo "sidecar binary not found; skipping recovery harness"
            echo "ok=0" > "$MF_TEST_KILL_SIDECAR_RESULT"
            echo "sidecar binary missing" >> "$MF_TEST_KILL_SIDECAR_RESULT"
            exit 1
          fi
          # Kill after 5s in CI (30s wall-clock of software rendering is
          # expensive); the harness accepts any positive MF_TEST_KILL_SIDECAR.
          export MF_TEST_KILL_SIDECAR=5
          xvfb-run -a timeout 180 ./target/release/metroforge || true
          if [ ! -f "$MF_TEST_KILL_SIDECAR_RESULT" ]; then
            echo "ok=0" > "$MF_TEST_KILL_SIDECAR_RESULT"
            echo "no result file written" >> "$MF_TEST_KILL_SIDECAR_RESULT"
          fi
          cat "$MF_TEST_KILL_SIDECAR_RESULT"
          grep -q '^ok=1$' "$MF_TEST_KILL_SIDECAR_RESULT"

      - name: Upload recovery result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-recovery-result
          path: sidecar-recovery-result.txt
          if-no-files-found: ignore

  sidecar-smoke:
    runs-on: ubuntu-latest
    steps:
      # The TypeScript sidecar (spec §2) lives in a sibling repo. This job
      # only exercises the sidecar in isolation (pure Bun/TS, no GPU, no
      # Rust client involved), so it doesn't need to check out
      # metroforge-native at all.
      #
      # NOTE(sidecar-merged 2026-07-10): sidecar merged to metroforge master
      # (PR #17/#18); pinned to the merge SHA so upstream changes can't
      # silently break CI. Bump deliberately.
      - name: Checkout metroforge (sidecar source)
        uses: actions/checkout@v4
        with:
          repository: Egg3901/metroforge
          ref: 6ce1bbafe71be7694bacd59073fbe5087d27ba8c
          path: metroforge

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: bun install (sidecar deps)
        working-directory: metroforge/sidecar
        run: bun install

      # Determinism regression gate (spec §2.6): two runs of the same seed
      # must produce identical stateHash and observed vehicle motion. No GPU
      # needed.
      - name: bun sidecar smoke test
        working-directory: metroforge/sidecar
        run: bun run smoke-test.ts
