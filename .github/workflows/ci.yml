name: CI

on:
  push:
    branches: [master]
  pull_request:

# Linux-only (spec §6): this is a private repo, and Windows/macOS runners
# carry a per-minute cost multiplier that isn't worth paying for every push.
# release.yml is where the 3-OS matrix lives.
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      - name: Install Bevy Linux system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      - name: cargo fmt --check
        working-directory: metroforge-native
        run: cargo fmt --check

      - name: cargo clippy -D warnings
        working-directory: metroforge-native
        run: cargo clippy --workspace --all-targets -j 4 -- -D warnings

      - name: cargo test
        working-directory: metroforge-native
        run: cargo test --workspace -j 4

      # Non-blocking dependency hygiene: duplicate versions, yanked crates,
      # and license allowlist. Failures print as annotations but never block
      # the smoke/clippy gate or release.yml.
      - name: cargo deny (warn only)
        continue-on-error: true
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: metroforge-native/Cargo.toml
          command: check advisories bans licenses sources

  # Optional: kill the sidecar mid-session and assert the client recovers
  # in place (MF_TEST_KILL_SIDECAR). Continues on error so a missing/broken
  # sidecar checkout never reds the required `rust` job — flip
  # `continue-on-error` to false once the recovery path is a hard gate.
  sidecar-recovery:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout metroforge-native
        uses: actions/checkout@v4
        with:
          path: metroforge-native

      - name: Checkout metroforge (sidecar source)
        uses: actions/checkout@v4
        with:
          repository: Egg3901/metroforge
          ref: 6ce1bbafe71be7694bacd59073fbe5087d27ba8c
          path: metroforge

      - name: Install Bevy Linux system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev pkg-config xvfb mesa-vulkan-drivers

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: metroforge-native

      - name: bun install + compile sidecar
        working-directory: metroforge/sidecar
        run: |
          bun install
          bun run compile:linux

      - name: Build mf-game
        working-directory: metroforge-native
        run: cargo build -p mf-game --release -j 4

      - name: Kill-sidecar recovery harness (30s)
        working-directory: metroforge-native
        env:
          MF_AUTOSTART: nyc
          MF_TEST_KILL_SIDECAR: "30"
          MF_TEST_KILL_SIDECAR_RESULT: ${{ github.workspace }}/sidecar-recovery-result.txt
          MF_SIDECAR_PATH: ${{ github.workspace }}/metroforge/sidecar/dist/metroforge-sidecar
          WGPU_BACKEND: vulkan
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          set -euo pipefail
          # Sidecar compile output path varies; accept common locations.
          if [ ! -x "$MF_SIDECAR_PATH" ]; then
            for candidate in \
              "${{ github.workspace }}/metroforge/sidecar/dist/metroforge-sidecar" \
              "${{ github.workspace }}/metroforge/dist-sidecar/metroforge-sidecar" \
              "${{ github.workspace }}/metroforge/sidecar/metroforge-sidecar"
            do
              if [ -x "$candidate" ]; then
                export MF_SIDECAR_PATH="$candidate"
                break
              fi
            done
          fi
          if [ ! -x "$MF_SIDECAR_PATH" ]; then
            echo "sidecar binary not found; skipping recovery harness"
            echo "ok=0" > "$MF_TEST_KILL_SIDECAR_RESULT"
            echo "sidecar binary missing" >> "$MF_TEST_KILL_SIDECAR_RESULT"
            exit 1
          fi
          # Kill after 5s in CI (30s wall-clock of software rendering is
          # expensive); the harness accepts any positive MF_TEST_KILL_SIDECAR.
          export MF_TEST_KILL_SIDECAR=5
          xvfb-run -a timeout 180 ./target/release/metroforge || true
          if [ ! -f "$MF_TEST_KILL_SIDECAR_RESULT" ]; then
            echo "ok=0" > "$MF_TEST_KILL_SIDECAR_RESULT"
            echo "no result file written" >> "$MF_TEST_KILL_SIDECAR_RESULT"
          fi
          cat "$MF_TEST_KILL_SIDECAR_RESULT"
          grep -q '^ok=1$' "$MF_TEST_KILL_SIDECAR_RESULT"

      - name: Upload recovery result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-recovery-result
          path: sidecar-recovery-result.txt
          if-no-files-found: ignore

  sidecar-smoke:
    runs-on: ubuntu-latest
    steps:
      # The TypeScript sidecar (spec §2) lives in a sibling repo. This job
      # only exercises the sidecar in isolation (pure Bun/TS, no GPU, no
      # Rust client involved), so it doesn't need to check out
      # metroforge-native at all.
      #
      # NOTE(sidecar-merged 2026-07-10): sidecar merged to metroforge master
      # (PR #17/#18); pinned to the merge SHA so upstream changes can't
      # silently break CI. Bump deliberately.
      - name: Checkout metroforge (sidecar source)
        uses: actions/checkout@v4
        with:
          repository: Egg3901/metroforge
          ref: 6ce1bbafe71be7694bacd59073fbe5087d27ba8c
          path: metroforge

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: bun install (sidecar deps)
        working-directory: metroforge/sidecar
        run: bun install

      # Determinism regression gate (spec §2.6): two runs of the same seed
      # must produce identical stateHash and observed vehicle motion. No GPU
      # needed.
      - name: bun sidecar smoke test
        working-directory: metroforge/sidecar
        run: bun run smoke-test.ts
