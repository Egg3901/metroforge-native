# cargo-deny configuration for metroforge-native.
# Wired into CI as a non-blocking warn step (see .github/workflows/ci.yml).
# Goals: surface duplicate crate versions, yanked crates, and license issues
# without failing the build gate.

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
]
all-features = false

[advisories]
# Yanked crates are the hard signal we care about in CI; vulnerability
# advisories still print (cargo-deny default) but the CI step is non-blocking.
yanked = "deny"
unmaintained = "workspace"

[licenses]
confidence-threshold = 0.8
# Allowlist aligned with Bevy + our MIT workspace license. Add exceptions
# below rather than widening this list casually.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "OFL-1.1",
    "BSL-1.0",
    # dirs-sys (via `directories`) pulls option-ext under MPL-2.0.
    "MPL-2.0",
    # Bevy's encase stack (GPU uniform derive) is MIT-0.
    "MIT-0",
    # egui's bundled epaint_default_fonts include Ubuntu Font Licence glyphs.
    "Ubuntu-font-1.0",
]

[bans]
# Multiple versions of the same crate: warn so CI surfaces them without
# failing the smoke/clippy gate. Prefer unifying when a workspace pin or
# Bevy feature trim can remove a duplicate (see BUILDING.md).
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
